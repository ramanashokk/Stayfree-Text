<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080809" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Stayfree Text" />
  <title>Stayfree Text</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #0D0D0F; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    @keyframes barPulse { 0%,100%{transform:scaleY(0.3);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }
    @keyframes ringExpand { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(1.9);opacity:0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    button { font-family: system-ui, -apple-system, sans-serif; cursor: pointer; }
    .pill { border: none; outline: none; transition: all .15s; }
    .pill:hover { opacity: 0.8; }
    .rec { outline: none; transition: all .18s; border: none; }
    .rec:hover:not(:disabled) { opacity: 0.85; }
    .rec:active:not(:disabled) { transform: scale(0.93); }
    .btn { outline: none; transition: opacity .15s; }
    .btn:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WORKER_URL = 'https://flow-proxy.sales003.workers.dev';

    const CONTEXTS = [
      { id: "message", label: "Message" },
      { id: "email",   label: "Email"   },
      { id: "slack",   label: "Slack"   },
      { id: "document",label: "Doc"     },
    ];

    const CONTEXT_PROMPTS = {
      message:  "a casual chat or text message. Keep it conversational and natural.",
      email:    "the body of a professional email. Use appropriate tone and structure.",
      slack:    "a Slack message. Concise, direct, professional but casual.",
      document: "a formal document or report paragraph.",
    };

    const COMMANDS = [
      "make this","make it","translate","shorter","longer",
      "more formal","more casual","in hindi","in english","in french",
      "summarize","rewrite","add bullets","bullet points","fix","remove",
    ];

    function isCommand(text, hasExisting) {
      if (!hasExisting) return false;
      const lower = text.toLowerCase().trim();
      return lower.split(/\s+/).length < 15 &&
        COMMANDS.some(c => lower.startsWith(c) || lower.includes(c));
    }

    function App() {
      const [isRecording, setIsRecording] = useState(false);
      const [rawTranscript, setRawTranscript] = useState("");
      const [cleanedText, setCleanedText] = useState("");
      const [context, setContext] = useState("message");
      const [status, setStatus] = useState("idle");
      const [copied, setCopied] = useState(false);
      const [supported, setSupported] = useState(true);

      const recRef = useRef(null);
      const finalRef = useRef("");
      const interimRef = useRef("");
      const recordingRef = useRef(false);
      const cleanedRef = useRef("");
      const contextRef = useRef("message");

      useEffect(() => { cleanedRef.current = cleanedText; }, [cleanedText]);
      useEffect(() => { contextRef.current = context; }, [context]);

      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const rec = new SR();
        rec.continuous = true;
        rec.interimResults = true;
        rec.onresult = (e) => {
          let nf = "", interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) nf += e.results[i][0].transcript + " ";
            else interim += e.results[i][0].transcript;
          }
          if (nf) finalRef.current += nf;
          interimRef.current = interim;
          setRawTranscript(finalRef.current + interim);
        };
        rec.onend = () => { if (recordingRef.current) try { rec.start(); } catch {} };
        recRef.current = rec;
        return () => { recordingRef.current = false; rec.abort(); };
      }, []);

      const startRecording = () => {
        finalRef.current = ""; interimRef.current = "";
        setRawTranscript(""); setCleanedText("");
        setStatus("recording"); setIsRecording(true); recordingRef.current = true;
        try { recRef.current?.start(); } catch {}
      };

      const stopAndProcess = async () => {
        recordingRef.current = false; recRef.current?.stop(); setIsRecording(false);
        const raw = (finalRef.current + interimRef.current).trim();
        if (!raw) { setStatus("idle"); return; }
        setStatus("processing");
        const existing = cleanedRef.current;
        const ctx = contextRef.current;
        const isCmd = isCommand(raw, !!existing);
        const messages = isCmd && existing
          ? [
              { role: "system", content: "Apply the user's instruction to the text. Return ONLY the modified text." },
              { role: "user", content: 'Text:\n"' + existing + '"\n\nInstruction: ' + raw }
            ]
          : [
              { role: "system", content: "Clean this raw voice transcript for use as " + CONTEXT_PROMPTS[ctx] + " Remove filler words (um, uh, like, you know, so, basically, right, anyway, etc.) and fix grammar. Do not add content. Return ONLY the cleaned text." },
              { role: "user", content: raw }
            ];
        try {
          const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages, max_tokens: 1000, temperature: 0.3 })
          });
          const data = await res.json();
          const text = data.choices?.[0]?.message?.content?.trim();
          if (!text) throw new Error();
          setCleanedText(text); setStatus("done");
        } catch { setStatus("error"); }
      };

      const toggle = () => {
        if (status === "processing") return;
        isRecording ? stopAndProcess() : startRecording();
      };

      const copy = () => {
        navigator.clipboard.writeText(cleanedText).catch(() => {});
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      };

      const reset = () => {
        setCleanedText(""); setRawTranscript("");
        finalRef.current = ""; interimRef.current = ""; setStatus("idle");
      };

      const hint = !supported ? "Not supported — use Chrome on Android"
        : status === "processing" ? "Cleaning your text..."
        : isRecording ? "Tap to stop"
        : status === "done" ? "Speak again or give a command"
        : "Tap the mic to speak";

      const BARS = [6, 12, 18, 12, 6];

      return (
        <div style={{ minHeight:"100vh", background:"#0D0D0F", display:"flex", flexDirection:"column", alignItems:"center", fontFamily:"system-ui,-apple-system,sans-serif", padding:"32px 20px 48px" }}>

          {/* Header */}
          <div style={{ width:"100%", maxWidth:480, marginBottom:32 }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
              <span style={{ fontSize:20, fontWeight:700, color:"#FFFFFF", letterSpacing:-0.5 }}>Stayfree</span>
              <span style={{ fontSize:20, fontWeight:300, color:"#FF5200", letterSpacing:-0.5 }}>Text</span>
            </div>
            <div style={{ fontSize:11, color:"#666", letterSpacing:1.5, textTransform:"uppercase", marginTop:4 }}>
              speak · clean · use
            </div>
          </div>

          {/* Context pills */}
          <div style={{ display:"flex", gap:8, marginBottom:20, width:"100%", maxWidth:480, flexWrap:"wrap" }}>
            {CONTEXTS.map(c => (
              <button key={c.id} className="pill" onClick={() => setContext(c.id)} style={{
                padding:"7px 16px", borderRadius:20,
                border: context===c.id ? "1px solid #FF5200" : "1px solid #333",
                background: context===c.id ? "rgba(255,82,0,0.12)" : "#1A1A1E",
                color: context===c.id ? "#FF6830" : "#AAAAAA",
                fontSize:13, fontWeight: context===c.id ? 600 : 400,
              }}>
                {c.label}
              </button>
            ))}
          </div>

          {/* Output card */}
          <div style={{ width:"100%", maxWidth:480, background:"#141416", borderRadius:16, border:"1px solid #222", padding:"20px", marginBottom:16, minHeight:180, display:"flex", flexDirection:"column" }}>
            {!cleanedText && (
              <div style={{ color:"#555", fontSize:14, lineHeight:1.7, flex:1 }}>
                {status==="recording" ? "🎤 Listening..." : status==="processing" ? "✨ Cleaning your text..." : "Your cleaned text will appear here.\nSpeak naturally — fillers will be removed."}
              </div>
            )}
            {cleanedText && (<>
              <div style={{ fontSize:15, lineHeight:1.8, color:"#E8E8E8", flex:1, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{cleanedText}</div>
              <div style={{ display:"flex", gap:8, marginTop:16, justifyContent:"flex-end" }}>
                <button className="btn" onClick={copy} style={{
                  padding:"6px 16px", borderRadius:8,
                  border: copied ? "1px solid #FF5200" : "1px solid #333",
                  background: copied ? "rgba(255,82,0,0.1)" : "#1A1A1E",
                  color: copied ? "#FF6830" : "#AAAAAA",
                  fontSize:12,
                }}>{copied ? "Copied ✓" : "Copy"}</button>
                <button className="btn" onClick={reset} style={{
                  padding:"6px 16px", borderRadius:8,
                  border:"1px solid #333", background:"#1A1A1E",
                  color:"#AAAAAA", fontSize:12,
                }}>Clear</button>
              </div>
            </>)}
            {status==="error" && (
              <div style={{ color:"#FF4444", fontSize:13, marginTop:8 }}>Failed. Check connection and try again.</div>
            )}
          </div>

          {/* Raw transcript */}
          {isRecording && rawTranscript && (
            <div style={{ width:"100%", maxWidth:480, marginBottom:10, fontSize:11, color:"#444", lineHeight:1.6, padding:"0 4px", wordBreak:"break-word" }}>
              {rawTranscript}
            </div>
          )}

          {/* Record button */}
          <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", marginTop:24, marginBottom:16 }}>
            {isRecording && (
              <div style={{ position:"absolute", width:80, height:80, borderRadius:"50%", border:"1px solid rgba(255,82,0,0.3)", animation:"ringExpand 1.5s ease-out infinite", pointerEvents:"none" }} />
            )}

            {isRecording && (
              <div style={{ position:"absolute", right:96, display:"flex", alignItems:"center", gap:3, height:28 }}>
                {BARS.map((h,i) => (
                  <div key={i} style={{ width:3, height:h, background:"rgba(255,82,0,0.6)", borderRadius:2, animation:"barPulse " + (0.65+i*0.07) + "s ease-in-out " + (i*0.09) + "s infinite", transformOrigin:"center" }} />
                ))}
              </div>
            )}

            <button className="rec" onClick={toggle} disabled={!supported || status==="processing"} style={{
              width:80, height:80, borderRadius:"50%",
              background: isRecording ? "#FF5200" : "#1A1A1E",
              border: isRecording ? "none" : "2px solid #333",
              cursor: !supported || status==="processing" ? "not-allowed" : "pointer",
              display:"flex", alignItems:"center", justifyContent:"center",
              position:"relative", zIndex:1,
              boxShadow: isRecording ? "0 0 32px rgba(255,82,0,0.3)" : "none",
            }}>
              {status==="processing" ? (
                <div style={{ width:22, height:22, border:"2px solid #333", borderTopColor:"#FF5200", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
              ) : isRecording ? (
                <div style={{ width:22, height:22, background:"#fff", borderRadius:4 }} />
              ) : (
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                  <rect x="9" y="2" width="6" height="11" rx="3" fill="#FF5200"/>
                  <path d="M5 11c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="12" y1="18" x2="12" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="9" y1="22" x2="15" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              )}
            </button>

            {isRecording && (
              <div style={{ position:"absolute", left:96, display:"flex", alignItems:"center", gap:3, height:28 }}>
                {BARS.map((h,i) => (
                  <div key={i} style={{ width:3, height:h, background:"rgba(255,82,0,0.6)", borderRadius:2, animation:"barPulse " + (0.65+i*0.07) + "s ease-in-out " + ((i+2.5)*0.09) + "s infinite", transformOrigin:"center" }} />
                ))}
              </div>
            )}
          </div>

          {/* Hint */}
          <div style={{ fontSize:13, color:"#666", marginTop:4 }}>{hint}</div>

          {/* Command hint */}
          {status==="done" && cleanedText && (
            <div style={{ fontSize:11, color:"#444", marginTop:16, maxWidth:280, textAlign:"center", lineHeight:1.8 }}>
              Try: "make it shorter" · "more formal" · "translate to Hindi"
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
