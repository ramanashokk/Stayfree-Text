<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080809" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Flow" />
  <title>Flow</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { background: #080809; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONTEXTS = [
      { id: "message", label: "Message" },
      { id: "email",   label: "Email"   },
      { id: "slack",   label: "Slack"   },
      { id: "document",label: "Doc"     },
    ];

    const CONTEXT_PROMPTS = {
      message:  "a casual chat or text message. Keep it conversational and natural.",
      email:    "the body of a professional email. Use appropriate tone and structure.",
      slack:    "a Slack message. Concise, direct, professional but casual.",
      document: "a formal document or report paragraph.",
    };

    const COMMANDS = [
      "make this","make it","translate","shorter","longer",
      "more formal","more casual","in hindi","in english","in french",
      "summarize","rewrite","add bullets","bullet points","fix","remove",
    ];

    function isCommand(text, hasExisting) {
      if (!hasExisting) return false;
      const lower = text.toLowerCase().trim();
      return lower.split(/\s+/).length < 15 &&
        COMMANDS.some(c => lower.startsWith(c) || lower.includes(c));
    }

    /* ── Setup screen ──────────────────────────────────────── */
    function Setup({ onSave }) {
      const [key, setKey]       = useState("");
      const [error, setError]   = useState("");
      const [testing, setTesting] = useState(false);

      const save = async () => {
        const k = key.trim();
        if (!k.startsWith("gsk_")) { setError("Groq keys start with gsk_"); return; }
        setTesting(true); setError("");
        try {
          const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${k}` },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: "hi" }], max_tokens: 5 }),
          });
          if (!res.ok) throw new Error();
          localStorage.setItem("flow_groq_key", k);
          onSave(k);
        } catch { setError("Key invalid or network error."); }
        finally { setTesting(false); }
      };

      return (
        <div style={{ minHeight:"100vh", background:"#080809", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"system-ui,-apple-system,sans-serif", padding:"32px 24px" }}>
          <div style={{ width:"100%", maxWidth:400 }}>
            <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:44 }}>
              <span style={{ fontSize:16, fontWeight:600, color:"#E4E4E8" }}>Flow</span>
              <div style={{ width:5, height:5, borderRadius:"50%", background:"#FF5200" }} />
            </div>
            <div style={{ fontSize:18, fontWeight:600, color:"#E4E4E8", marginBottom:8 }}>Enter your Groq API key</div>
            <div style={{ fontSize:12, color:"#333", lineHeight:1.7, marginBottom:28 }}>
              Free at <span style={{ color:"#FF6830" }}>console.groq.com</span> → API Keys → Create.<br/>
              No credit card. Stored only on this device.
            </div>
            <input
              type="password" placeholder="gsk_..."
              value={key} onChange={e => { setKey(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && save()}
              style={{ width:"100%", padding:"12px 14px", borderRadius:10, border: error ? "1px solid rgba(255,68,68,0.4)" : "1px solid #1E1E22", background:"#0E0E10", color:"#D4D4D8", fontSize:13, fontFamily:"ui-monospace,monospace", outline:"none", marginBottom:10, WebkitAppearance:"none" }}
            />
            {error && <div style={{ fontSize:11, color:"#FF4444", marginBottom:10 }}>{error}</div>}
            <button onClick={save} disabled={testing || !key.trim()} style={{ width:"100%", padding:13, borderRadius:10, border:"none", background: testing || !key.trim() ? "#1A1A1E" : "#FF5200", color: testing || !key.trim() ? "#333" : "#fff", fontSize:13, fontWeight:600, cursor: testing || !key.trim() ? "not-allowed" : "pointer", fontFamily:"inherit" }}>
              {testing ? "Checking..." : "Save & continue"}
            </button>
          </div>
        </div>
      );
    }

    /* ── Main app ──────────────────────────────────────────── */
    function App({ apiKey, onReset }) {
      const [isRecording, setIsRecording] = useState(false);
      const [rawTranscript, setRawTranscript] = useState("");
      const [cleanedText, setCleanedText]   = useState("");
      const [context, setContext]           = useState("message");
      const [status, setStatus]             = useState("idle");
      const [copied, setCopied]             = useState(false);
      const [supported, setSupported]       = useState(true);
      const [showSettings, setShowSettings] = useState(false);

      const recRef       = useRef(null);
      const finalRef     = useRef("");
      const interimRef   = useRef("");
      const recordingRef = useRef(false);
      const cleanedRef   = useRef("");
      const contextRef   = useRef("message");

      useEffect(() => { cleanedRef.current  = cleanedText; }, [cleanedText]);
      useEffect(() => { contextRef.current  = context;     }, [context]);

      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSupported(false); return; }
        const rec = new SR();
        rec.continuous = true; rec.interimResults = true;
        rec.onresult = (e) => {
          let nf = "", interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) nf += e.results[i][0].transcript + " ";
            else interim += e.results[i][0].transcript;
          }
          if (nf) finalRef.current += nf;
          interimRef.current = interim;
          setRawTranscript(finalRef.current + interim);
        };
        rec.onend = () => { if (recordingRef.current) try { rec.start(); } catch {} };
        recRef.current = rec;
        return () => { recordingRef.current = false; rec.abort(); };
      }, []);

      const startRecording = () => {
        finalRef.current = ""; interimRef.current = "";
        setRawTranscript(""); setCleanedText("");
        setStatus("recording"); setIsRecording(true); recordingRef.current = true;
        try { recRef.current?.start(); } catch {}
      };

      const stopAndProcess = async () => {
        recordingRef.current = false; recRef.current?.stop(); setIsRecording(false);
        const raw = (finalRef.current + interimRef.current).trim();
        if (!raw) { setStatus("idle"); return; }
        setStatus("processing");
        const existing = cleanedRef.current;
        const ctx = contextRef.current;
        const isCmd = isCommand(raw, !!existing);
        const messages = isCmd && existing
          ? [{ role:"system", content:"Apply the user's instruction to the text. Return ONLY the modified text." },
             { role:"user",   content:`Text:\n"${existing}"\n\nInstruction: ${raw}` }]
          : [{ role:"system", content:`Clean this raw voice transcript for use as ${CONTEXT_PROMPTS[ctx]} Remove filler words (um, uh, like, you know, so, basically, right, anyway, etc.) and fix grammar. Do not add content. Return ONLY the cleaned text.` },
             { role:"user",   content: raw }];
        try {
          const res  = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method:"POST",
            headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${apiKey}` },
            body: JSON.stringify({ model:"llama-3.3-70b-versatile", messages, max_tokens:1000, temperature:0.3 }),
          });
          const data = await res.json();
          const text = data.choices?.[0]?.message?.content?.trim();
          if (!text) throw new Error();
          setCleanedText(text); setStatus("done");
        } catch { setStatus("error"); }
      };

      const toggle = () => {
        if (status === "processing") return;
        isRecording ? stopAndProcess() : startRecording();
      };

      const copy = () => {
        navigator.clipboard.writeText(cleanedText).catch(() => {});
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      };

      const reset = () => {
        setCleanedText(""); setRawTranscript("");
        finalRef.current = ""; interimRef.current = ""; setStatus("idle");
      };

      const hint = !supported           ? "not supported in this browser"
        : status === "processing"       ? "cleaning..."
        : isRecording                   ? "tap to stop"
        : status === "done"             ? "speak again or give a command"
        :                                 "tap to speak";

      const BARS = [6, 12, 18, 12, 6];

      return (
        <div style={{ minHeight:"100vh", background:"#080809", display:"flex", flexDirection:"column", alignItems:"center", fontFamily:"system-ui,-apple-system,sans-serif", color:"#F0F0F0", padding:"28px 20px 44px" }}>
          <style>{`
            @keyframes barPulse { 0%,100%{transform:scaleY(0.3);opacity:0.4} 50%{transform:scaleY(1);opacity:1} }
            @keyframes ringExpand { 0%{transform:scale(1);opacity:0.35} 100%{transform:scale(1.9);opacity:0} }
            @keyframes spin { to{transform:rotate(360deg)} }
            .pill{transition:all .12s;border:none;outline:none} .pill:hover{opacity:.8}
            .rec{transition:all .18s;outline:none} .rec:hover:not(:disabled){opacity:.88} .rec:active:not(:disabled){transform:scale(.93)}
            .sm{transition:opacity .1s;outline:none} .sm:hover{opacity:.65}
          `}</style>

          {/* Header */}
          <div style={{ width:"100%", maxWidth:480, marginBottom:36, display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                <span style={{ fontSize:15, fontWeight:600, letterSpacing:-0.3, color:"#E4E4E8" }}>Flow</span>
                <div style={{ width:5, height:5, borderRadius:"50%", background:"#FF5200" }} />
              </div>
              <div style={{ fontSize:9, color:"#222224", letterSpacing:2.5, textTransform:"uppercase", marginTop:3 }}>speak · clean · use</div>
            </div>
            <button className="sm" onClick={() => setShowSettings(s => !s)} style={{ background:"transparent", border:"1px solid #1A1A1E", borderRadius:8, padding:"4px 10px", color:"#2A2A30", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>⚙ key</button>
          </div>

          {/* Settings panel */}
          {showSettings && (
            <div style={{ width:"100%", maxWidth:480, background:"#0E0E10", borderRadius:12, border:"1px solid #1A1A1E", padding:16, marginBottom:20, fontSize:11, color:"#333" }}>
              <div style={{ marginBottom:10 }}>API key: <span style={{ fontFamily:"monospace", color:"#2A2A30" }}>gsk_••••••••{apiKey.slice(-6)}</span></div>
              <button className="sm" onClick={onReset} style={{ background:"transparent", border:"1px solid #1E1E22", borderRadius:6, padding:"4px 10px", color:"#333", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>Change key</button>
            </div>
          )}

          {/* Context pills */}
          <div style={{ display:"flex", gap:6, marginBottom:24, width:"100%", maxWidth:480, flexWrap:"wrap" }}>
            {CONTEXTS.map(c => (
              <button key={c.id} className="pill" onClick={() => setContext(c.id)} style={{ padding:"5px 13px", borderRadius:20, border: context===c.id ? "1px solid rgba(255,82,0,0.5)" : "1px solid #1C1C20", background: context===c.id ? "rgba(255,82,0,0.07)" : "transparent", color: context===c.id ? "#FF6830" : "#323238", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                {c.label}
              </button>
            ))}
          </div>

          {/* Output card */}
          <div style={{ width:"100%", maxWidth:480, background:"#0E0E10", borderRadius:14, border:"1px solid #171719", padding:22, marginBottom:16, minHeight:172, display:"flex", flexDirection:"column" }}>
            {!cleanedText && (
              <div style={{ color:"#222226", fontSize:14, lineHeight:1.65, flex:1 }}>
                {status==="recording" ? "Listening..." : status==="processing" ? "Cleaning..." : "Speak — cleaned text appears here."}
              </div>
            )}
            {cleanedText && (<>
              <div style={{ fontSize:14, lineHeight:1.8, fontFamily:"ui-monospace,'Cascadia Code',monospace", color:"#D4D4D8", flex:1, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>{cleanedText}</div>
              <div style={{ display:"flex", gap:6, marginTop:18, justifyContent:"flex-end" }}>
                <button className="sm" onClick={copy} style={{ padding:"4px 12px", borderRadius:6, border: copied ? "1px solid rgba(255,82,0,0.35)" : "1px solid #1C1C20", background:"transparent", color: copied ? "#FF6830" : "#2E2E34", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>{copied ? "Copied ✓" : "Copy"}</button>
                <button className="sm" onClick={reset} style={{ padding:"4px 12px", borderRadius:6, border:"1px solid #141416", background:"transparent", color:"#222226", fontSize:10, cursor:"pointer", fontFamily:"inherit" }}>Clear</button>
              </div>
            </>)}
            {status==="error" && <div style={{ color:"#FF4444", fontSize:12, marginTop: cleanedText ? 10 : 0 }}>Failed. Check your key or try again.</div>}
          </div>

          {/* Raw transcript */}
          {isRecording && rawTranscript && (
            <div style={{ width:"100%", maxWidth:480, marginBottom:10, fontSize:10, color:"#1E1E22", fontFamily:"ui-monospace,monospace", lineHeight:1.55, padding:"0 2px", wordBreak:"break-word" }}>{rawTranscript}</div>
          )}

          {/* Record button */}
          <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", marginTop:28, marginBottom:14 }}>
            {isRecording && <div style={{ position:"absolute", width:72, height:72, borderRadius:"50%", border:"1px solid rgba(255,82,0,0.25)", animation:"ringExpand 1.5s ease-out infinite", pointerEvents:"none" }} />}

            {isRecording && (
              <div style={{ position:"absolute", right:90, display:"flex", alignItems:"center", gap:2.5, height:26 }}>
                {BARS.map((h,i) => <div key={i} style={{ width:2.5, height:h, background:"rgba(255,82,0,0.45)", borderRadius:2, animation:`barPulse ${0.65+i*0.07}s ease-in-out ${i*0.09}s infinite`, transformOrigin:"center" }} />)}
              </div>
            )}

            <button className="rec" onClick={toggle} disabled={!supported || status==="processing"} style={{ width:72, height:72, borderRadius:"50%", background: isRecording ? "#FF5200" : "#0E0E10", border: isRecording ? "none" : "1px solid #1E1E22", cursor: !supported||status==="processing" ? "not-allowed" : "pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", zIndex:1, boxShadow: isRecording ? "0 0 28px rgba(255,82,0,0.2),0 0 56px rgba(255,82,0,0.07)" : "none" }}>
              {status==="processing" ? (
                <div style={{ width:18, height:18, border:"1.5px solid #222", borderTopColor:"#FF5200", borderRadius:"50%", animation:"spin 0.7s linear infinite" }} />
              ) : isRecording ? (
                <div style={{ width:20, height:20, background:"#fff", borderRadius:4 }} />
              ) : (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <rect x="9" y="2" width="6" height="11" rx="3" fill="#FF5200"/>
                  <path d="M5 11c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="12" y1="18" x2="12" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                  <line x1="9" y1="22" x2="15" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              )}
            </button>

            {isRecording && (
              <div style={{ position:"absolute", left:90, display:"flex", alignItems:"center", gap:2.5, height:26 }}>
                {BARS.map((h,i) => <div key={i} style={{ width:2.5, height:h, background:"rgba(255,82,0,0.45)", borderRadius:2, animation:`barPulse ${0.65+i*0.07}s ease-in-out ${(i+2.5)*0.09}s infinite`, transformOrigin:"center" }} />)}
              </div>
            )}
          </div>

          <div style={{ fontSize:10, color:"#1E1E22", letterSpacing:0.3 }}>{hint}</div>
          {status==="done" && cleanedText && (
            <div style={{ fontSize:9, color:"#18181C", marginTop:14, maxWidth:264, textAlign:"center", lineHeight:1.7 }}>
              "make it shorter" · "more formal" · "translate to Hindi"
            </div>
          )}
        </div>
      );
    }

    /* ── Root ──────────────────────────────────────────────── */
    function Root() {
      const [apiKey, setApiKey] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        const k = localStorage.getItem("flow_groq_key");
        if (k) setApiKey(k);
        setLoading(false);
      }, []);
      const handleReset = () => { localStorage.removeItem("flow_groq_key"); setApiKey(null); };
      if (loading) return null;
      return apiKey ? <App apiKey={apiKey} onReset={handleReset} /> : <Setup onSave={setApiKey} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
