<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D0D0F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Stayfree Text" />
  <title>Stayfree Text</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body,#root { height:100%; }
    body { background:#0D0D0F; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; color:#fff; font-family:system-ui,-apple-system,sans-serif; }
    button { font-family:inherit; cursor:pointer; }
    @keyframes barPulse { 0%,100%{transform:scaleY(0.3);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }
    @keyframes ringExpand { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(1.9);opacity:0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const WORKER = 'https://flow-proxy.sales003.workers.dev';
const WA = '919999999999'; // replace with your WhatsApp number

const CONTEXTS = [
  { id:'message', label:'Message' },
  { id:'email',   label:'Email'   },
  { id:'slack',   label:'Slack'   },
  { id:'doc',     label:'Doc'     },
];

const PROMPTS = {
  message:  'a casual chat or text message. Keep it conversational and natural.',
  email:    'the body of a professional email. Use appropriate tone and structure.',
  slack:    'a Slack message. Concise, direct, professional but casual.',
  doc:      'a formal document or report paragraph.',
};

const CMD_TRIGGERS = ['make it','make this','translate','shorter','longer','more formal','more casual','in hindi','in english','in french','summarize','rewrite','add bullets','fix','remove'];

function isCmd(text, hasExisting) {
  if (!hasExisting) return false;
  const l = text.toLowerCase().trim();
  return l.split(/\s+/).length < 15 && CMD_TRIGGERS.some(c => l.startsWith(c) || l.includes(c));
}

function PricingSheet({ onClose }) {
  return (
    <div onClick={onClose} style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100,animation:'fadeIn 0.2s ease' }}>
      <div onClick={e => e.stopPropagation()} style={{ background:'#1A1A1E',borderRadius:'24px 24px 0 0',padding:'32px 24px 48px',width:'100%',maxWidth:480,borderTop:'1px solid rgba(255,255,255,0.1)' }}>
        <div style={{ textAlign:'center',marginBottom:24 }}>
          <div style={{ fontSize:11,color:'#FF5200',letterSpacing:2,textTransform:'uppercase',marginBottom:8 }}>Premium</div>
          <div style={{ fontSize:24,fontWeight:700,marginBottom:6 }}>Unlimited cleanups</div>
          <div style={{ fontSize:14,color:'rgba(255,255,255,0.5)',lineHeight:1.6 }}>No daily limits. Works even when free tier is busy.</div>
        </div>
        <div style={{ background:'#0D0D0F',borderRadius:14,padding:20,marginBottom:24,border:'1px solid rgba(255,255,255,0.08)' }}>
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14 }}>
            <span style={{ color:'rgba(255,255,255,0.7)',fontSize:14 }}>Monthly</span>
            <span style={{ fontSize:20,fontWeight:700 }}>₹99 <span style={{ fontSize:13,fontWeight:400,color:'rgba(255,255,255,0.4)' }}>/mo</span></span>
          </div>
          <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
            <span style={{ color:'rgba(255,255,255,0.7)',fontSize:14 }}>Yearly</span>
            <div style={{ textAlign:'right' }}>
              <span style={{ fontSize:20,fontWeight:700,color:'#FF5200' }}>₹799 <span style={{ fontSize:13,fontWeight:400,color:'rgba(255,255,255,0.4)' }}>/yr</span></span>
              <div style={{ fontSize:11,color:'rgba(255,255,255,0.3)' }}>Save ₹389</div>
            </div>
          </div>
        </div>
        <button onClick={() => window.open('https://wa.me/'+WA+'?text=Hi%2C+I+want+Stayfree+Text+Premium','_blank')} style={{ width:'100%',padding:16,borderRadius:14,border:'none',background:'#FF5200',color:'#fff',fontSize:15,fontWeight:700,marginBottom:12 }}>
          Get Premium via WhatsApp
        </button>
        <button onClick={onClose} style={{ width:'100%',padding:14,borderRadius:14,border:'1.5px solid rgba(255,255,255,0.15)',background:'transparent',color:'rgba(255,255,255,0.5)',fontSize:14 }}>
          Maybe later
        </button>
      </div>
    </div>
  );
}

function App() {
  const [recording, setRecording] = useState(false);
  const [rawText, setRawText]     = useState('');
  const [cleaned, setCleaned]     = useState('');
  const [ctx, setCtx]             = useState('message');
  const [status, setStatus]       = useState('idle');
  const [copied, setCopied]       = useState(false);
  const [supported, setSupported] = useState(true);
  const [errType, setErrType]     = useState(null);
  const [pricing, setPricing]     = useState(false);

  const recRef     = useRef(null);
  const finalRef   = useRef('');
  const interimRef = useRef('');
  const recActive  = useRef(false);
  const cleanedRef = useRef('');
  const ctxRef     = useRef('message');

  useEffect(() => { cleanedRef.current = cleaned; }, [cleaned]);
  useEffect(() => { ctxRef.current = ctx; }, [ctx]);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSupported(false); return; }
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.onresult = e => {
      let fin = '', int = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) fin += e.results[i][0].transcript + ' ';
        else int += e.results[i][0].transcript;
      }
      finalRef.current   = fin;
      interimRef.current = int;
      setRawText(fin + int);
    };
    r.onend = () => { if (recActive.current) try { r.start(); } catch(_) {} };
    recRef.current = r;
    return () => { recActive.current = false; r.abort(); };
  }, []);

  const startRec = () => {
    finalRef.current = ''; interimRef.current = '';
    setRawText(''); setCleaned(''); setErrType(null);
    setStatus('recording'); setRecording(true); recActive.current = true;
    try { recRef.current.start(); } catch(_) {}
  };

  const stopAndProcess = async () => {
    recActive.current = false;
    recRef.current.stop();
    setRecording(false);

    // small wait so browser can finalize last result
    await new Promise(r => setTimeout(r, 150));

    const raw = (finalRef.current.trim() || interimRef.current.trim());
    if (!raw) { setStatus('idle'); return; }
    setStatus('processing');

    const existing = cleanedRef.current;
    const c = ctxRef.current;
    const cmd = isCmd(raw, !!existing);

    const messages = cmd && existing
      ? [
          { role:'system', content:'Apply the user\'s instruction to the text. Return ONLY the modified text.' },
          { role:'user',   content:'Text:\n"' + existing + '"\n\nInstruction: ' + raw }
        ]
      : [
          { role:'system', content:'Clean this raw voice transcript for use as ' + PROMPTS[c] + ' Remove filler words (um, uh, like, you know, so, basically, right, anyway) and fix grammar. Do not add content. Return ONLY the cleaned text.' },
          { role:'user',   content: raw }
        ];

    try {
      const res  = await fetch(WORKER, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ model:'llama-3.3-70b-versatile', messages, max_tokens:1000, temperature:0.3 })
      });
      if (res.status === 429) {
        const d = await res.json();
        setErrType(d.error === 'daily_limit' ? 'daily_limit' : 'service_limit');
        setStatus('error'); return;
      }
      const d    = await res.json();
      const text = d.choices?.[0]?.message?.content?.trim();
      if (!text) throw new Error();
      setCleaned(text); setStatus('done');
    } catch(_) { setErrType('generic'); setStatus('error'); }
  };

  const toggle = () => {
    if (status === 'processing') return;
    recording ? stopAndProcess() : startRec();
  };

  const copy = () => {
    navigator.clipboard.writeText(cleaned).catch(() => {});
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const clear = () => {
    setCleaned(''); setRawText('');
    finalRef.current = ''; interimRef.current = '';
    setStatus('idle'); setErrType(null);
  };

  const hint = !supported       ? 'Use Chrome on Android'
    : status==='processing'     ? 'Cleaning your text...'
    : recording                 ? 'Tap to stop'
    : status==='done'           ? 'Speak again or give a command'
    :                             'Tap the mic to speak';

  const B = [6,12,18,12,6];

  const s = (obj) => obj;

  return (
    <div style={{ minHeight:'100vh',background:'#0D0D0F',display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 20px 48px' }}>

      {pricing && <PricingSheet onClose={() => setPricing(false)} />}

      {/* Header */}
      <div style={{ width:'100%',maxWidth:480,marginBottom:28,display:'flex',justifyContent:'space-between',alignItems:'flex-start' }}>
        <div>
          <div style={{ display:'flex',alignItems:'baseline',gap:6 }}>
            <span style={{ fontSize:22,fontWeight:700,color:'#fff' }}>Stayfree</span>
            <span style={{ fontSize:22,fontWeight:300,color:'#FF5200' }}>Text</span>
          </div>
          <div style={{ fontSize:11,color:'rgba(255,255,255,0.3)',letterSpacing:2,textTransform:'uppercase',marginTop:4 }}>speak · clean · use</div>
        </div>
        <button onClick={() => setPricing(true)} style={{ padding:'8px 16px',borderRadius:20,border:'1.5px solid #FF5200',background:'rgba(255,82,0,0.08)',color:'#FF5200',fontSize:12,fontWeight:600 }}>
          Premium
        </button>
      </div>

      {/* Context pills */}
      <div style={{ display:'flex',gap:8,marginBottom:20,width:'100%',maxWidth:480,flexWrap:'wrap' }}>
        {CONTEXTS.map(c => (
          <button key={c.id} onClick={() => setCtx(c.id)} style={{ padding:'8px 18px',borderRadius:24,border: ctx===c.id ? '1.5px solid #FF5200' : '1.5px solid rgba(255,255,255,0.2)',background: ctx===c.id ? 'rgba(255,82,0,0.15)' : 'transparent',color: ctx===c.id ? '#FF5200' : '#fff',fontSize:13,fontWeight: ctx===c.id ? 600 : 400 }}>
            {c.label}
          </button>
        ))}
      </div>

      {/* Output card */}
      <div style={{ width:'100%',maxWidth:480,background:'#1A1A1E',borderRadius:16,border:'1.5px solid rgba(255,255,255,0.08)',padding:20,marginBottom:16,minHeight:180,display:'flex',flexDirection:'column',gap:16 }}>
        {!cleaned && status !== 'error' && (
          <div style={{ color:'rgba(255,255,255,0.35)',fontSize:14,lineHeight:1.8,flex:1 }}>
            {status==='recording' ? '🎤  Listening...' : status==='processing' ? '✨  Cleaning your text...' : 'Your cleaned text appears here.\nSpeak naturally — fillers removed automatically.'}
          </div>
        )}
        {cleaned && (
          <>
            <div style={{ fontSize:15,lineHeight:1.8,color:'#fff',flex:1,whiteSpace:'pre-wrap',wordBreak:'break-word' }}>{cleaned}</div>
            <div style={{ display:'flex',gap:8,justifyContent:'flex-end' }}>
              <button onClick={copy} style={{ padding:'7px 18px',borderRadius:8,border: copied ? '1.5px solid #FF5200' : '1.5px solid rgba(255,255,255,0.2)',background: copied ? 'rgba(255,82,0,0.15)' : 'transparent',color: copied ? '#FF5200' : '#fff',fontSize:13 }}>
                {copied ? 'Copied ✓' : 'Copy'}
              </button>
              <button onClick={clear} style={{ padding:'7px 18px',borderRadius:8,border:'1.5px solid rgba(255,255,255,0.2)',background:'transparent',color:'#fff',fontSize:13 }}>
                Clear
              </button>
            </div>
          </>
        )}
        {status==='error' && (
          <div style={{ background: errType==='daily_limit' ? 'rgba(255,82,0,0.08)' : 'transparent',border: errType==='daily_limit' ? '1.5px solid rgba(255,82,0,0.3)' : '1.5px solid rgba(255,255,255,0.1)',borderRadius:12,padding:16 }}>
            <div style={{ fontSize:14,fontWeight:600,marginBottom:6 }}>
              {errType==='daily_limit' ? 'Daily limit reached' : errType==='service_limit' ? 'Service busy' : 'Something went wrong'}
            </div>
            <div style={{ fontSize:13,color:'rgba(255,255,255,0.5)',lineHeight:1.6,marginBottom: errType==='daily_limit' ? 14 : 0 }}>
              {errType==='daily_limit' ? 'You\'ve used your 30 free cleanups today. Resets at midnight.' : errType==='service_limit' ? 'Groq servers are busy. Try again in a few minutes.' : 'Check your connection and try again.'}
            </div>
            {errType==='daily_limit' && (
              <button onClick={() => setPricing(true)} style={{ width:'100%',padding:11,borderRadius:10,border:'none',background:'#FF5200',color:'#fff',fontSize:13,fontWeight:600 }}>
                Get Premium — Unlimited
              </button>
            )}
          </div>
        )}
      </div>

      {/* Raw transcript */}
      {recording && rawText && (
        <div style={{ width:'100%',maxWidth:480,marginBottom:10,fontSize:12,color:'rgba(255,255,255,0.2)',lineHeight:1.6,wordBreak:'break-word' }}>
          {rawText}
        </div>
      )}

      {/* Mic button */}
      <div style={{ position:'relative',display:'flex',alignItems:'center',justifyContent:'center',marginTop:20,marginBottom:16 }}>
        {recording && <div style={{ position:'absolute',width:84,height:84,borderRadius:'50%',border:'1.5px solid rgba(255,82,0,0.4)',animation:'ringExpand 1.5s ease-out infinite',pointerEvents:'none' }} />}

        {recording && (
          <div style={{ position:'absolute',right:100,display:'flex',alignItems:'center',gap:3,height:28 }}>
            {B.map((h,i) => <div key={i} style={{ width:3,height:h,background:'#FF5200',borderRadius:2,animation:'barPulse '+(0.65+i*0.07)+'s ease-in-out '+(i*0.09)+'s infinite',transformOrigin:'center' }} />)}
          </div>
        )}

        <button onClick={toggle} disabled={!supported || status==='processing'} style={{ width:84,height:84,borderRadius:'50%',background: recording ? '#FF5200' : '#1A1A1E',border: recording ? 'none' : '2px solid rgba(255,255,255,0.15)',cursor: !supported||status==='processing' ? 'not-allowed' : 'pointer',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',zIndex:1,boxShadow: recording ? '0 0 40px rgba(255,82,0,0.4)' : 'none',transition:'all 0.18s' }}>
          {status==='processing' ? (
            <div style={{ width:24,height:24,border:'2.5px solid rgba(255,255,255,0.15)',borderTopColor:'#FF5200',borderRadius:'50%',animation:'spin 0.7s linear infinite' }} />
          ) : recording ? (
            <div style={{ width:24,height:24,background:'#fff',borderRadius:5 }} />
          ) : (
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="2" width="6" height="11" rx="3" fill="#FF5200"/>
              <path d="M5 11c0 3.866 3.134 7 7 7s7-3.134 7-7" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="12" y1="18" x2="12" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="9" y1="22" x2="15" y2="22" stroke="#FF5200" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          )}
        </button>

        {recording && (
          <div style={{ position:'absolute',left:100,display:'flex',alignItems:'center',gap:3,height:28 }}>
            {B.map((h,i) => <div key={i} style={{ width:3,height:h,background:'#FF5200',borderRadius:2,animation:'barPulse '+(0.65+i*0.07)+'s ease-in-out '+((i+2.5)*0.09)+'s infinite',transformOrigin:'center' }} />)}
          </div>
        )}
      </div>

      <div style={{ fontSize:13,color:'rgba(255,255,255,0.4)',marginTop:4 }}>{hint}</div>

      {status==='done' && cleaned && (
        <div style={{ fontSize:12,color:'rgba(255,255,255,0.2)',marginTop:14,maxWidth:280,textAlign:'center',lineHeight:1.8 }}>
          Try: "make it shorter" · "more formal" · "translate to Hindi"
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
